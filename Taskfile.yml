version: '3'

vars:
  IMAGE: ghcr.io/jfroy/etincelle:latest
  OUTPUT_DIR: '{{.ROOT_DIR}}/output'
  CONFIG: '{{.ROOT_DIR}}/config.toml'
  BUILDER_IMAGE: quay.io/centos-bootc/bootc-image-builder:latest
  # Linux: rootless build via bootc-image-builder's --in-vm KVM mode.
  # macOS: rootful podman machine (run `podman machine set --rootful` first);
  #        rootless --in-vm cannot access KVM inside Apple's hypervisor.
  STORAGE_SRC: '{{if eq OS "darwin"}}/var/lib/containers/storage{{else}}$HOME/.local/share/containers/storage{{end}}'
  IN_VM: '{{if eq OS "darwin"}}{{else}}--in-vm{{end}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  bake:
    desc: 'Build a bootable qcow2 from the bootc image (override with IMAGE=...)'
    preconditions:
      - sh: 'test -f {{.CONFIG}}'
        msg: '{{.CONFIG}} not found — copy image-builder/config.toml.example and add your SSH key'
      - sh: 'command -v podman >/dev/null'
        msg: 'podman not found in PATH'
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}
      - podman pull {{.IMAGE}}
      - podman pull {{.BUILDER_IMAGE}}
      - |
        podman run --rm -it --privileged \
          --security-opt label=type:unconfined_t \
          -v {{.OUTPUT_DIR}}:/output \
          -v {{.CONFIG}}:/config.toml:ro \
          -v {{.STORAGE_SRC}}:/var/lib/containers/storage \
          {{.BUILDER_IMAGE}} \
          {{.IN_VM}} \
          --type qcow2 \
          --rootfs xfs \
          --use-librepo=True \
          {{.IMAGE}}
      - ls -lh {{.OUTPUT_DIR}}/qcow2/disk.qcow2

  provision:
    desc: 'Provision secrets on a fresh VM (HOST=<ip-or-host> [SSH_USER=fedora])'
    requires:
      vars: [HOST]
    env:
      SSH_USER: '{{.SSH_USER | default "fedora"}}'
    cmds:
      - ./scripts/provision-secrets.sh {{.HOST}}

  clean:
    desc: Remove built disk images
    cmds:
      - rm -rf {{.OUTPUT_DIR}}
