# Service data directories. Created at boot so quadlet volume mounts succeed.
# /var on bootc/ostree systems is per-deployment state, not part of the image.
d /var/beszel-agent      0755 root root -
d /var/caddy             0755 root root -
d /var/caddy/data        0755 root root -
d /var/caddy/config      0755 root root -
d /var/discovery-service 0755 root root -
d /var/image-factory     0755 root root -
d /var/image-factory/tmp 0755 root root -
d /var/zot             0755 root root -
d /var/zot/data        0755 root root -
